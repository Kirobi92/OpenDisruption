model:
  # GitHub AI als primäres Modell (GH_TOKEN muss gesetzt sein) - zuverlässiges Function Calling
  default: "${HERMES_DEFAULT_MODEL:openai/gpt-4.1}"
  provider: "custom"
  base_url: "${HERMES_MODEL_BASE_URL:https://models.github.ai/inference/v1}"
  key_env: "GH_TOKEN"

# Ollama als Fallback wenn offline
fallback_model:
  base_url: "http://ollama:11434/v1"
  model: "qwen2.5:14b"
  provider: "ollama"

fallback_providers: []

agent:
  api_timeout: 1800
  tool_use_enforcement: required
  reasoning_effort: high

# Telegram-Gateway: Token kommt aus TELEGRAM_BOT_TOKEN Umgebungsvariable
telegram:
  require_mention: false
  streaming: true
  allowed_chats: "${TELEGRAM_ALLOWED_USER_IDS}"

streaming:
  enabled: true
  transport: "edit"
  edit_interval: 1.2

# Aktive Skills für OpenDisruption-Orchestrierung
skills:
  - opendisruption
  - nutzi

# Genehmigungen: bei kritischen Aktionen via Telegram nachfragen
approvals:
  mode: auto
  cron_mode: deny

display:
  language: de
  personality: kirobi

terminal:
  backend: local
  cwd: /home/sven/OpenDisruption

channels: {}
