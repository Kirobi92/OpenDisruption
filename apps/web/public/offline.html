<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Kirobi – offline</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      background: linear-gradient(160deg, #0f172a 0%, #0369a1 100%);
      color: #f0f9ff;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      max-width: 28rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 1.25rem;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 .5rem; font-size: 1.75rem; }
    p  { margin: .25rem 0 1rem; color: #cbd5e1; }
    button {
      background: #0284c7; color: #fff; border: 0; border-radius: .75rem;
      padding: .75rem 1.25rem; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #0369a1; }
    .dot { display:inline-block; width:.5rem; height:.5rem; border-radius:50%; background:#38bdf8; margin-right:.5rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1><span class="dot" aria-hidden="true"></span>Du bist offline</h1>
    <p>
      Kirobi läuft als lokale PWA. Sobald du wieder im Netz von <strong>kirobi.local</strong>
      bist, wird die App automatisch aktualisiert.
    </p>
    <button onclick="location.reload()">Erneut versuchen</button>
  </main>
</body>
</html>
