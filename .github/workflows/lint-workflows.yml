name: Lint GitHub Actions Workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint — Workflow Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: shellcheck installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: actionlint installieren
        run: |
          ACTIONLINT_VERSION="1.7.12"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin actionlint
          actionlint --version

      - name: shellcheck — Shell-Skripte prüfen (SC2102/SC2001/SC2086)
        id: shellcheck
        run: |
          set +e
          # Alle Shell-Skripte im Repo finden (sh/bash)
          SHELL_FILES=$(find . -type f \( -name "*.sh" -o -name "*.bash" \) \
            ! -path "./.git/*" ! -path "./node_modules/*" 2>/dev/null)

          # Inline-Shell in Workflows via actionlint (nutzt shellcheck intern)
          SC_OUTPUT=""
          SC_EXIT=0

          if [ -n "$SHELL_FILES" ]; then
            # shellcheck disable=SC2086
            SC_OUTPUT=$(shellcheck -S warning $SHELL_FILES 2>&1)
            SC_EXIT=$?
          else
            SC_OUTPUT="Keine Shell-Skripte (.sh/.bash) gefunden."
          fi

          SC_ISSUE_COUNT=$(echo "$SC_OUTPUT" | grep -c "^In " || true)
          echo "sc_issue_count=$SC_ISSUE_COUNT"
          # Als Step-Output exportieren für Job-Summary-Tabelle
          echo "sc_issue_count=$SC_ISSUE_COUNT" >> "$GITHUB_OUTPUT"

          {
            echo "## 🐚 shellcheck Ergebnisse"
            echo ""
            if [ $SC_EXIT -eq 0 ]; then
              echo "![SHELLCHECK PASS](https://img.shields.io/badge/shellcheck-PASS-brightgreen?style=flat-square)"
              echo ""
              echo "✅ Keine shellcheck-Warnungen gefunden."
            else
              echo "![SHELLCHECK FAIL](https://img.shields.io/badge/shellcheck-WARN-orange?style=flat-square)"
              echo ""
              echo "\`\`\`"
              echo "$SC_OUTPUT"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # SC-Findings als Annotations ausgeben
          if [ $SC_EXIT -ne 0 ]; then
            echo "$SC_OUTPUT" | grep -E "^In .+ line [0-9]+:" | while IFS= read -r line; do
              FILE="${line#In }"; FILE="${FILE% line*}"
              LINENO="${line##* line }"; LINENO="${LINENO%%:*}"
              echo "::warning file=${FILE},line=${LINENO}::shellcheck Warnung — bitte prüfen"
            done
          fi

          # SC-Warnungen blockieren den Lint-Job nicht (nur actionlint ist blocking)
          exit 0

      - name: Alle Workflows linten
        id: lint
        run: |
          set +e
          # shellcheck disable=SC2086
          # SC2086 (info): actionlint -shellcheck übergibt Argumente direkt — disable damit Exit 0 bei reinen info-Findings
          LINT_OUTPUT=$(actionlint -shellcheck "shellcheck --exclude=SC2086" .github/workflows/*.yml 2>&1)
          LINT_EXIT=$?
          set -e

          # Zähler berechnen
          WORKFLOW_FILES=(.github/workflows/*.yml)
          WORKFLOW_COUNT=${#WORKFLOW_FILES[@]}
          ERROR_COUNT=$(echo "$LINT_OUTPUT" | grep -cE '^[^:]+:[0-9]+:[0-9]+: error:' || true)

          # GitHub Job-Summary ausgeben
          {
            echo "## 🔍 actionlint Lint Results"
            echo ""
            # shields.io HTML-Badges: grün bei Pass, rot bei Fail
            if [ $LINT_EXIT -eq 0 ]; then
              echo "![LINT PASS](https://img.shields.io/badge/LINT-PASS-brightgreen?style=flat-square&logo=githubactions&logoColor=white) ![Workflows](https://img.shields.io/badge/Workflows-${WORKFLOW_COUNT}-blue?style=flat-square) ![Errors](https://img.shields.io/badge/Errors-0-brightgreen?style=flat-square)"
            else
              echo "![LINT FAIL](https://img.shields.io/badge/LINT-FAIL-red?style=flat-square&logo=githubactions&logoColor=white) ![Workflows](https://img.shields.io/badge/Workflows-${WORKFLOW_COUNT}-blue?style=flat-square) ![Errors](https://img.shields.io/badge/Errors-${ERROR_COUNT}-red?style=flat-square)"
            fi
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo ""
            echo "### 📊 Zusammenfassung"
            echo ""
            echo "| Metrik | Wert |"
            echo "|--------|------|"
            echo "| Geprüfte Workflows | ${WORKFLOW_COUNT} |"
            echo "| Fehler gesamt | ${ERROR_COUNT} |"
            echo "| shellcheck Findings | ${{ steps.shellcheck.outputs.sc_issue_count || '0' }} |"
            if [ $LINT_EXIT -eq 0 ]; then
              echo "| Ergebnis | ✅ lint-clean |"
            else
              echo "| Ergebnis | ❌ Fehler gefunden |"
            fi
            echo ""
            echo "### 📋 Workflow-Details"
            echo ""
            echo "| Workflow | Status | Fehler |"
            echo "|----------|--------|--------|"
            for f in "${WORKFLOW_FILES[@]}"; do
              fname=$(basename "$f")
              # Fehler für diese Datei zählen
              file_errors=$(echo "$LINT_OUTPUT" | grep -cE "^\.github/workflows/${fname}:[0-9]+:[0-9]+: error:" || true)
              if [ "$file_errors" -eq 0 ]; then
                echo "| \`${fname}\` | ✅ OK | 0 |"
              else
                echo "| \`${fname}\` | ❌ Fehler | ${file_errors} |"
              fi
            done
            echo ""
            if [ $LINT_EXIT -ne 0 ]; then
              echo "### ❌ Lint-Fehler Detail"
              echo ""
              echo "\`\`\`"
              echo "$LINT_OUTPUT"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Fehler-Annotations für PR-UX (mit Spalte für präzise Inline-Markierung im Diff)
          if [ $LINT_EXIT -ne 0 ]; then
            # Top-Level Summary-Annotation: erscheint oben in PR-Checks
            echo "::error::actionlint: ${ERROR_COUNT} Fehler in ${WORKFLOW_COUNT} Workflow-Datei(en) gefunden. Vollständige Details im Job-Summary (Actions Tab)."
            while IFS= read -r line; do
              # Format: file:line:col: error: message [rule]
              if echo "$line" | grep -qE '^[^:]+:[0-9]+:[0-9]+: error:'; then
                FILE=$(echo "$line" | cut -d: -f1)
                LINE=$(echo "$line" | cut -d: -f2)
                COL=$(echo "$line" | cut -d: -f3)
                # Gesamte Nachricht (inkl. Rule-Bezeichnung) für maximale Kontextinformation
                TRIMMED="${line#*: error: }"
                echo "::error file=${FILE},line=${LINE},col=${COL}::actionlint: ${TRIMMED}"
              fi
            done <<< "$LINT_OUTPUT"
          fi

          exit $LINT_EXIT

      - name: Telegram-Notification bei Lint-Fehler
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="❌ *lint-workflows.yml FAILED*%0A%0A*Repo:* \`${{ github.repository }}\`%0A*Branch:* \`${{ github.ref_name }}\`%0A*Commit:* \`${{ github.sha }}\`%0A%0AActionlint hat Fehler in GitHub Actions Workflows gefunden.%0A👉 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true" > /dev/null

      - name: Telegram-Alert bei SC_ISSUE_COUNT > Schwelle
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIROBI_LINT_NOTIFY_SUCCESS: ${{ vars.KIROBI_LINT_NOTIFY_SUCCESS || 'false' }}
          KIROBI_SC_ALERT_THRESHOLD: ${{ vars.KIROBI_SC_ALERT_THRESHOLD || '0' }}
          SC_COUNT: ${{ steps.shellcheck.outputs.sc_issue_count || '0' }}
        run: |
          # Nur senden wenn KIROBI_LINT_NOTIFY_SUCCESS=true UND SC_COUNT > KIROBI_SC_ALERT_THRESHOLD
          if [ "${KIROBI_LINT_NOTIFY_SUCCESS}" != "true" ]; then
            echo "SC-Alert deaktiviert (KIROBI_LINT_NOTIFY_SUCCESS=false)"
            exit 0
          fi
          if [ "${SC_COUNT}" -le "${KIROBI_SC_ALERT_THRESHOLD}" ]; then
            echo "SC-Alert: ${SC_COUNT} Findings ≤ Schwelle ${KIROBI_SC_ALERT_THRESHOLD} — kein Alert."
            exit 0
          fi
          MESSAGE="⚠️ *shellcheck Alert — lint-workflows.yml*%0A%0A*SC Findings:* ${SC_COUNT} (Schwelle: ${KIROBI_SC_ALERT_THRESHOLD})%0A*Repo:* \`${{ github.repository }}\`%0A*Branch:* \`${{ github.ref_name }}\`%0A*Commit:* \`${{ github.sha }}\`%0A%0AshellCheck hat ${SC_COUNT} Finding(s) gefunden — bitte prüfen.%0A👉 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true" > /dev/null

      - name: Telegram-Notification bei Lint-Erfolg
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIROBI_LINT_NOTIFY_SUCCESS: ${{ vars.KIROBI_LINT_NOTIFY_SUCCESS || 'false' }}
        run: |
          # Nur senden wenn KIROBI_LINT_NOTIFY_SUCCESS=true (Standard: false für ruhigen Betrieb)
          if [ "${KIROBI_LINT_NOTIFY_SUCCESS}" != "true" ]; then
            echo "Success-Notification deaktiviert (KIROBI_LINT_NOTIFY_SUCCESS=false)"
            exit 0
          fi
          MESSAGE="✅ *lint-workflows.yml PASSED*%0A%0A*Repo:* \`${{ github.repository }}\`%0A*Branch:* \`${{ github.ref_name }}\`%0A*Commit:* \`${{ github.sha }}\`%0A%0AAlle Workflows sind lint-clean — actionlint Exit 0.%0A👉 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true" > /dev/null
