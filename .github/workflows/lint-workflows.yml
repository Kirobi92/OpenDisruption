name: Lint GitHub Actions Workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint — Workflow Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: actionlint installieren
        run: |
          ACTIONLINT_VERSION="1.7.12"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin actionlint
          actionlint --version

      - name: Alle Workflows linten
        id: lint
        run: |
          set +e
          LINT_OUTPUT=$(actionlint .github/workflows/*.yml 2>&1)
          LINT_EXIT=$?
          set -e

          # Zähler berechnen
          WORKFLOW_FILES=(.github/workflows/*.yml)
          WORKFLOW_COUNT=${#WORKFLOW_FILES[@]}
          ERROR_COUNT=$(echo "$LINT_OUTPUT" | grep -cE '^[^:]+:[0-9]+:[0-9]+: error:' || true)

          # GitHub Job-Summary ausgeben
          {
            echo "## 🔍 actionlint Lint Results"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Branch:** \`${{ github.ref_name }}\`"
            echo ""
            echo "### 📊 Zusammenfassung"
            echo ""
            echo "| Metrik | Wert |"
            echo "|--------|------|"
            echo "| Geprüfte Workflows | ${WORKFLOW_COUNT} |"
            echo "| Fehler gesamt | ${ERROR_COUNT} |"
            if [ $LINT_EXIT -eq 0 ]; then
              echo "| Ergebnis | ✅ lint-clean |"
            else
              echo "| Ergebnis | ❌ Fehler gefunden |"
            fi
            echo ""
            echo "### 📋 Workflow-Details"
            echo ""
            echo "| Workflow | Status | Fehler |"
            echo "|----------|--------|--------|"
            for f in "${WORKFLOW_FILES[@]}"; do
              fname=$(basename "$f")
              # Fehler für diese Datei zählen
              file_errors=$(echo "$LINT_OUTPUT" | grep -cE "^\.github/workflows/${fname}:[0-9]+:[0-9]+: error:" || true)
              if [ "$file_errors" -eq 0 ]; then
                echo "| \`${fname}\` | ✅ OK | 0 |"
              else
                echo "| \`${fname}\` | ❌ Fehler | ${file_errors} |"
              fi
            done
            echo ""
            if [ $LINT_EXIT -ne 0 ]; then
              echo "### ❌ Lint-Fehler Detail"
              echo ""
              echo "\`\`\`"
              echo "$LINT_OUTPUT"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Fehler-Annotations für PR-UX
          if [ $LINT_EXIT -ne 0 ]; then
            while IFS= read -r line; do
              # Format: file:line:col: error: message [rule]
              if echo "$line" | grep -qE '^[^:]+:[0-9]+:[0-9]+: error:'; then
                FILE=$(echo "$line" | cut -d: -f1)
                LINE=$(echo "$line" | cut -d: -f2)
                # Remove "file:line:col: error: " prefix using bash string operations
                TRIMMED="${line#*: error: }"
                MSG="${TRIMMED%% \[*\]}"
                echo "::error file=${FILE},line=${LINE}::${MSG}"
              fi
            done <<< "$LINT_OUTPUT"
          fi

          exit $LINT_EXIT

      - name: Telegram-Notification bei Lint-Fehler
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="❌ *lint-workflows.yml FAILED*%0A%0A*Repo:* \`${{ github.repository }}\`%0A*Branch:* \`${{ github.ref_name }}\`%0A*Commit:* \`${{ github.sha }}\`%0A%0AActionlint hat Fehler in GitHub Actions Workflows gefunden.%0A👉 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true" > /dev/null

      - name: Telegram-Notification bei Lint-Erfolg
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIROBI_LINT_NOTIFY_SUCCESS: ${{ vars.KIROBI_LINT_NOTIFY_SUCCESS || 'false' }}
        run: |
          # Nur senden wenn KIROBI_LINT_NOTIFY_SUCCESS=true (Standard: false für ruhigen Betrieb)
          if [ "${KIROBI_LINT_NOTIFY_SUCCESS}" != "true" ]; then
            echo "Success-Notification deaktiviert (KIROBI_LINT_NOTIFY_SUCCESS=false)"
            exit 0
          fi
          MESSAGE="✅ *lint-workflows.yml PASSED*%0A%0A*Repo:* \`${{ github.repository }}\`%0A*Branch:* \`${{ github.ref_name }}\`%0A*Commit:* \`${{ github.sha }}\`%0A%0AAlle Workflows sind lint-clean — actionlint Exit 0.%0A👉 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true" > /dev/null
