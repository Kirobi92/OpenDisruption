name: Lint & Count Workflows

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

# Vermeide parallele Runs auf demselben Branch
concurrency:
  group: lint-workflows-${{ github.ref }}
  cancel-in-progress: true

# ── Referenz-Baseline ────────────────────────────────────────────────────────
# WORKFLOW_COUNT_REF wird manuell gepflegt und spiegelt den zuletzt bestätigten
# sauberen Stand wider. Abweichungen ≥2 lösen einen Telegram-Alert aus.
# Letzte Änderung: 2026-05-24 (OPE-301: lint-frontend.yml hinzugefügt — 9 Workflows)
env:
  WORKFLOW_COUNT_REF: "9"
  TELEGRAM_CHAT_ID: "1066082496"

jobs:
  count-and-lint:
    name: Workflow-Count & Delta-Alert
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Aktuelle Workflow-Anzahl ermitteln ────────────────────────────
      - name: Count workflow files
        id: count
        run: |
          COUNT=$(find .github/workflows -maxdepth 1 -name "*.yml" -o -name "*.yaml" | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice title=Workflow Count::Aktuelle Anzahl: $COUNT | Referenz: ${{ env.WORKFLOW_COUNT_REF }}"

      # ── 2. Delta berechnen und Alert auslösen ────────────────────────────
      - name: Delta-Check & Telegram-Alert
        env:
          CURRENT: ${{ steps.count.outputs.count }}
          REF: ${{ env.WORKFLOW_COUNT_REF }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.KIROBI_TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ env.TELEGRAM_CHAT_ID }}
        run: |
          DELTA=$(( CURRENT - REF ))
          ABS_DELTA=${DELTA#-}
          echo "Delta: $DELTA (abs: $ABS_DELTA)"

          if [ "$ABS_DELTA" -ge 2 ]; then
            echo "::warning title=WORKFLOW_COUNT Delta ≥2::Delta=$DELTA — Telegram-Alert wird gesendet"

            if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
              MESSAGE="⚠️ *Kirobi APK — Workflow-Anzahl-Alert*%0A%0A"
              MESSAGE+="Aktuelle Anzahl: \`$CURRENT\`%0A"
              MESSAGE+="Referenz-Baseline: \`$REF\`%0A"
              MESSAGE+="Delta: \`$DELTA\` (Schwelle: ≥2)%0A%0A"
              MESSAGE+="Mögliche Ursache: Workflows wurden versehentlich gelöscht oder viele neue hinzugefügt.%0A"
              MESSAGE+="🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

              curl -s -X POST \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${CHAT_ID}" \
                -d "text=${MESSAGE}" \
                -d "parse_mode=Markdown" \
                --fail-with-body
            else
              echo "::warning::KIROBI_TELEGRAM_BOT_TOKEN nicht gesetzt — Alert nur lokal geloggt."
            fi

            # Job schlägt fehl, damit der PR blockiert wird
            exit 1
          else
            echo "✅ Workflow-Count im Rahmen (Delta=$DELTA, Schwelle=2). Kein Alert."
          fi

      # ── 3. YAML-Lint aller Workflow-Dateien ──────────────────────────────
      - name: Install yamllint
        run: pip install yamllint --quiet

      - name: Lint all workflow YAMLs
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 160}}}' \
            .github/workflows/*.yml

      # ── 4. actionlint — GitHub Actions Syntax-Check ──────────────────────
      # Shellcheck-Findings unterhalb "error"-Level (info/style/warning wie
      # SC2086, SC2102, SC2129, SC2193) → SC_ALERT in Summary, kein exit-1.
      # Nur echte shellcheck-Errors führen zu LINT FAIL.
      # Konfiguration: .actionlint.yaml + scripts/shellcheck-error-only.sh
      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.12"
          curl -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          sudo mv actionlint /usr/local/bin/actionlint

      - name: actionlint — Workflow-Syntax prüfen (SC_ALERT non-blocking)
        id: actionlint
        run: |
          chmod +x scripts/shellcheck-error-only.sh
          SC_FINDINGS=$(actionlint -shellcheck scripts/shellcheck-error-only.sh \
            .github/workflows/*.yml 2>&1 || true)
          echo "$SC_FINDINGS"

          # SC_ALERT: Info/Warning-Findings für Job-Summary sammeln
          SC_ALERT_COUNT=$(echo "$SC_FINDINGS" | grep -c '\[shellcheck\]' || true)
          echo "sc_alert_count=$SC_ALERT_COUNT" >> "$GITHUB_OUTPUT"

          if [ -n "$SC_FINDINGS" ]; then
            echo "## ⚠️ SC_ALERT — actionlint Shellcheck-Findings (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$SC_FINDINGS" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "ℹ️ Findings auf info/style/warning-Level blockieren den CI-Run nicht." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ✅ actionlint — keine Findings" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 5. Referenz-Dokumentation in Job-Summary verlinken ───────────────
      - name: Link README.ci.md in Job-Summary
        if: always()
        run: |
          echo "## 📚 CI-Dokumentation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Vollständige Beschreibung aller Workflows und CI-Prozesse:" >> "$GITHUB_STEP_SUMMARY"
          echo "👉 [README.ci.md](https://github.com/${{ github.repository }}/blob/master/README.ci.md)" >> "$GITHUB_STEP_SUMMARY"
