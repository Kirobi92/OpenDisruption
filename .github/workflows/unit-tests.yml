name: Frontend Unit Tests (Vitest)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/vite.config.ts'
      - 'frontend/tsconfig*.json'
      - 'frontend/capacitor.config.ts'
      - 'frontend/android/**'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/vite.config.ts'
      - 'frontend/tsconfig*.json'
      - 'frontend/capacitor.config.ts'
      - 'frontend/android/**'
      - '.github/workflows/unit-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest — Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        id: vitest
        run: |
          # Capture stderr separately for diagnostics on failure.
          # Module-Import-Fehler landen oft nur auf stderr (Exit 1 ohne Stdout-Info).
          npm run test -- --reporter=verbose 2> vitest-stderr.log
          VITEST_EXIT=$?
          # Ensure stderr is visible in the step log even on success (informational warnings)
          if [ -s vitest-stderr.log ]; then
            echo "── STDERR OUTPUT ──"
            cat vitest-stderr.log
          fi
          exit $VITEST_EXIT

      - name: 🔍 Vitest Failure Diagnostic
        if: failure() && steps.vitest.outcome == 'failure'
        run: |
          echo "## 🔍 Vitest Failure Diagnostic" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f vitest-stderr.log ] && [ -s vitest-stderr.log ]; then
            echo "### 📋 Stderr-Log (Modul-Import-Fehler & Runtime-Errors)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 80 vitest-stderr.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ Kein Stderr-Log vorhanden. Fehlerursache nicht über Stderr diagnostizierbar." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Nächste Schritte:**" >> $GITHUB_STEP_SUMMARY
          echo "- Prüfe ob alle importierten Module existieren" >> $GITHUB_STEP_SUMMARY
          echo "- `npx vitest run --reporter=verbose` lokal ausführen" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript-Compile-Fehler via \`npx tsc --noEmit\` prüfen" >> $GITHUB_STEP_SUMMARY

      - name: Run Vitest with Coverage
        id: vitest-coverage
        if: always() && steps.vitest.outcome != 'skipped'
        continue-on-error: true
        run: npm run test:coverage -- --reporter=verbose
        # Optionaler Coverage-Run — darf fehlschlagen ohne den Workflow zu blocken

      - name: Write Job Summary
        if: always()
        run: |
          echo "## 🧪 Vitest Unit Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vitest.outcome }}" == "success" ]; then
            echo "![PASS](https://img.shields.io/badge/Unit%20Tests-PASS-brightgreen)" >> $GITHUB_STEP_SUMMARY
          else
            echo "![FAIL](https://img.shields.io/badge/Unit%20Tests-FAIL-red)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Schritt | Ergebnis |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| MusicHealthConfigPanel Tests | ${{ steps.vitest.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| StoryIndex Tests | ${{ steps.vitest.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DownloadHistoryPanel Tests | ${{ steps.vitest.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- Coverage Section ---
          COVERAGE_JSON="coverage/coverage-summary.json"
          if [ -f "$COVERAGE_JSON" ]; then
            echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Gesamt-Coverage
            TOTAL_STMTS=$(jq -r '.total.statements.pct // "N/A"' "$COVERAGE_JSON")
            TOTAL_BRANCH=$(jq -r '.total.branches.pct // "N/A"' "$COVERAGE_JSON")
            TOTAL_FN=$(jq -r '.total.functions.pct // "N/A"' "$COVERAGE_JSON")
            TOTAL_LINES=$(jq -r '.total.lines.pct // "N/A"' "$COVERAGE_JSON")

            echo "| Metrik | Gesamt (%) |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Statements | ${TOTAL_STMTS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${TOTAL_BRANCH}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${TOTAL_FN}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | ${TOTAL_LINES}% |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # ScAlertsPanel.tsx Coverage (falls vorhanden)
            SC_ALERTS_KEY=$(jq -r 'keys[]' "$COVERAGE_JSON" | grep -i "ScAlertsPanel" | head -1)
            if [ -n "$SC_ALERTS_KEY" ]; then
              SC_STMTS=$(jq -r ".[\"$SC_ALERTS_KEY\"].statements.pct // \"N/A\"" "$COVERAGE_JSON")
              SC_BRANCH=$(jq -r ".[\"$SC_ALERTS_KEY\"].branches.pct // \"N/A\"" "$COVERAGE_JSON")
              SC_FN=$(jq -r ".[\"$SC_ALERTS_KEY\"].functions.pct // \"N/A\"" "$COVERAGE_JSON")
              SC_LINES=$(jq -r ".[\"$SC_ALERTS_KEY\"].lines.pct // \"N/A\"" "$COVERAGE_JSON")

              echo "### 🔍 ScAlertsPanel.tsx" >> $GITHUB_STEP_SUMMARY
              echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
              echo "| Statements | ${SC_STMTS}% |" >> $GITHUB_STEP_SUMMARY
              echo "| Branches | ${SC_BRANCH}% |" >> $GITHUB_STEP_SUMMARY
              echo "| Functions | ${SC_FN}% |" >> $GITHUB_STEP_SUMMARY
              echo "| Lines | ${SC_LINES}% |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            else
              echo "> ℹ️ *ScAlertsPanel.tsx* noch nicht im Coverage-Report — Komponente wird in OPE-275–278 aufgebaut." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            echo "📁 Coverage-Details: [coverage/index.html](./coverage/index.html)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ Kein Coverage-Report gefunden (\`coverage/coverage-summary.json\` fehlt)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "Workflow: \`${{ github.workflow }}\` | Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage HTML Report
        if: always() && steps.vitest-coverage.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7

      - name: Upload Vitest Coverage Results JSON
        if: always() && steps.vitest-coverage.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-results
          path: frontend/coverage/coverage-summary.json
          retention-days: 7
          if-no-files-found: warn

      - name: Telegram — Failure Notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"❌ *Kirobi CI — Unit Tests FAILED*\\n\\nWorkflow: \`${{ github.workflow }}\`\\nBranch: \`${{ github.ref_name }}\`\\nCommit: \`${{ github.sha }}\`\\n\\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"parse_mode\": \"Markdown\"
            }"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Telegram — Success Notification
        if: success() && env.KIROBI_UNIT_NOTIFY_SUCCESS == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"✅ *Kirobi CI — Unit Tests PASSED*\\n\\nWorkflow: \`${{ github.workflow }}\`\\nBranch: \`${{ github.ref_name }}\`\",
              \"parse_mode\": \"Markdown\"
            }"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIROBI_UNIT_NOTIFY_SUCCESS: ${{ vars.KIROBI_UNIT_NOTIFY_SUCCESS }}
