name: Frontend Unit Tests (Vitest)

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/vite.config.ts'
      - 'frontend/tsconfig*.json'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/vite.config.ts'
      - 'frontend/tsconfig*.json'
      - '.github/workflows/unit-tests.yml'
  workflow_dispatch:

permissions:
  contents: write  # write für git auto-commit der README.ci.md

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest — Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (JSON report)
        id: vitest
        run: npm run test -- --reporter=json --outputFile=vitest-results.json
        continue-on-error: true
        # JSON-Report für dynamische Job-Summary; Exit-Code wird in next step geprüft

      - name: Upload Vitest JSON as artifact
        if: always() && (steps.vitest.outcome == 'success' || steps.vitest.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results-${{ github.run_id }}
          path: frontend/vitest-results.json
          retention-days: 7
          if-no-files-found: warn
        # Speichert vitest-results.json als Build-Artefakt für Audit/Debugging
        # Verhindert Regression durch veraltete lokale JSON-Dateien

      - name: Run Vitest Coverage (optional, non-blocking)
        id: coverage
        run: npx vitest run --coverage --reporter=json --outputFile=vitest-coverage-results.json 2>&1 | tee coverage-output.txt
        continue-on-error: true
        # Optionaler Coverage-Lauf; blockiert nicht den Build bei Fehlern

      - name: Write Job Summary (dynamisch via vitest --reporter=json)
        if: always()
        run: |
          echo "## 🧪 Vitest Unit Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vitest.outcome }}" == "success" ]; then
            echo "![PASS](https://img.shields.io/badge/Unit%20Tests-PASS-brightgreen)" >> $GITHUB_STEP_SUMMARY
          else
            echo "![FAIL](https://img.shields.io/badge/Unit%20Tests-FAIL-red)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test-File | Tests | Passed | Failed | Skipped | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------:|-------:|-------:|--------:|---------:|" >> $GITHUB_STEP_SUMMARY
          if [ -f vitest-results.json ]; then
            CWD=$(pwd)/
            jq -r --arg cwd "$CWD" '
              .testResults[] |
              (if .numFailingTests == 0 then "✅" else "❌" end) as $icon |
              (.name | ltrimstr($cwd)) as $file |
              (.numPassingTests + .numFailingTests + .numPendingTests) as $total |
              (.perfStats.runtime // 0 | . / 1000 * 100 | round / 100 | tostring + "s") as $dur |
              "| \($icon) `\($file)` | \($total) | \(.numPassingTests) | \(.numFailingTests) | \(.numPendingTests) | \($dur) |"
            ' vitest-results.json >> $GITHUB_STEP_SUMMARY
            jq -r '"| **TOTAL** | **\(.numTotalTests)** | **\(.numPassedTests)** | **\(.numFailedTests)** | **\(.numPendingTests)** | — |"' \
              vitest-results.json >> $GITHUB_STEP_SUMMARY
          else
            echo "| _(vitest-results.json nicht gefunden)_ | — | — | — | — | — |" >> $GITHUB_STEP_SUMMARY
          fi
          echo ""
          echo "## ⚙️ Coverage — System-Modul (src/modules/system/)" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------:|----------:|:------:|" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            SYS_LINES_PCT=$(jq -r '
              [to_entries[] | select(.key | test("src/modules/system/"))] as $sys |
              if ($sys | length) > 0 then
                ($sys | map(.value.lines.total) | add) as $tl |
                ($sys | map(.value.lines.covered) | add) as $cl |
                (if $tl > 0 then ($cl / $tl * 100 * 10 | floor) / 10 else 0 end)
              else -1 end' coverage/coverage-summary.json)
            SYS_BRANCHES_PCT=$(jq -r '
              [to_entries[] | select(.key | test("src/modules/system/"))] as $sys |
              if ($sys | length) > 0 then
                ($sys | map(.value.branches.total) | add) as $tb |
                ($sys | map(.value.branches.covered) | add) as $cb |
                (if $tb > 0 then ($cb / $tb * 100 * 10 | floor) / 10 else 0 end)
              else -1 end' coverage/coverage-summary.json)
            if [ "$SYS_LINES_PCT" = "-1" ] || [ "$SYS_BRANCHES_PCT" = "-1" ]; then
              echo "| — | — | — | _(keine System-Modul-Dateien)_ |" >> $GITHUB_STEP_SUMMARY
            else
              LINES_OK=$(echo "$SYS_LINES_PCT >= 50" | bc -l)
              BRANCHES_OK=$(echo "$SYS_BRANCHES_PCT >= 40" | bc -l)
              if [ "$LINES_OK" = "1" ]; then LINES_ICON="✅"; else LINES_ICON="⚠️"; fi
              if [ "$BRANCHES_OK" = "1" ]; then BRANCHES_ICON="✅"; else BRANCHES_ICON="⚠️"; fi
              echo "| Lines | ${SYS_LINES_PCT}% | ≥50% | ${LINES_ICON} |" >> $GITHUB_STEP_SUMMARY
              echo "| Branches | ${SYS_BRANCHES_PCT}% | ≥40% | ${BRANCHES_ICON} |" >> $GITHUB_STEP_SUMMARY
              # Farb-Badge basierend auf Threshold-Status
              if [ "$LINES_OK" = "1" ] && [ "$BRANCHES_OK" = "1" ]; then
                echo "![System Coverage](https://img.shields.io/badge/System%20Module-OK-brightgreen)" >> $GITHUB_STEP_SUMMARY
              else
                echo "![System Coverage](https://img.shields.io/badge/System%20Module-WARNING-yellow)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          else
            echo "| — | — | — | _(coverage-summary.json fehlt)_ |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Workflow: \`${{ github.workflow }}\` | Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Update README.ci.md (vitest-table-gen.sh)
        id: table-update
        if: steps.vitest.outcome == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          bash scripts/vitest-table-gen.sh --update --input-file frontend/vitest-results.json
        working-directory: .
        # Nur auf Push zu master/main — nicht bei PRs (kein Schreibzugriff)

      - name: Commit updated README.ci.md
        id: commit-table
        if: steps.table-update.outcome == 'success'
        run: |
          if git diff --quiet README.ci.md; then
            echo "📋 Keine Änderungen an README.ci.md — kein Commit nötig"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.ci.md
            git commit -m "docs: auto-update Test-Datei-Tabelle via vitest-table-gen.sh [skip ci]"
            git push
            echo "✅ README.ci.md via vitest-table-gen.sh aktualisiert und committet"
          fi
        # Auto-Commit der aktualisierten Test-Tabelle (nur wenn Diff existiert)

      - name: Fail build if tests failed
        if: steps.vitest.outcome == 'failure'
        run: exit 1

      - name: Telegram — Failure Notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"❌ *Kirobi CI — Unit Tests FAILED*\\n\\nWorkflow: \`${{ github.workflow }}\`\\nBranch: \`${{ github.ref_name }}\`\\nCommit: \`${{ github.sha }}\`\\n\\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"parse_mode\": \"Markdown\"
            }"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Telegram — Success Notification
        if: success() && env.KIROBI_UNIT_NOTIFY_SUCCESS == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"✅ *Kirobi CI — Unit Tests PASSED*\\n\\nWorkflow: \`${{ github.workflow }}\`\\nBranch: \`${{ github.ref_name }}\`\\nCommit: \`${{ github.sha }}\`\\n\\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"parse_mode\": \"Markdown\"
            }"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIROBI_UNIT_NOTIFY_SUCCESS: ${{ vars.KIROBI_UNIT_NOTIFY_SUCCESS }}
