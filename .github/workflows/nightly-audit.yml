name: nightly-audit

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pip-audit
      - name: Unit tests
        run: python -m pytest tests/unit -q
      - name: Repo gate (integration-test)
        run: make integration-test
        continue-on-error: true
      - name: pip-audit (advisory)
        run: pip-audit --strict || true

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: ShellCheck installer + scripts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          shellcheck -S warning install.sh infra/scripts/*.sh

  notify-telegram-on-failure:
    if: failure()
    needs: [python-tests, shell-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_NOTIFY_CHANNEL_ID: ${{ secrets.TELEGRAM_NOTIFY_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -n "$TELEGRAM_BOT_TOKEN" ] || exit 0
          [ -n "$TELEGRAM_NOTIFY_CHANNEL_ID" ] || exit 0
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_NOTIFY_CHANNEL_ID}" \
            --data-urlencode "text=⚠ nightly-audit FAILED on ${{ github.repository }} — ${RUN_URL}" \
            --data-urlencode "disable_web_page_preview=true" > /dev/null
