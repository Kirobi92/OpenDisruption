name: Build Release APK

on:
  push:
    branches: [master]
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/android/**'
      - 'frontend/capacitor.config.ts'
      - 'frontend/package.json'
      - 'frontend/vite.config.ts'
      - '.github/workflows/build-release-apk.yml'
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'APK version suffix (e.g. hotfix1)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: build-release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Release APK (JDK 21 + Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Vite Build (Web Assets)
        working-directory: frontend
        run: npm run build

      - name: Capacitor Sync (Web → Android)
        working-directory: frontend
        run: npx cap sync android

      - name: Decode Keystore from Secret
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 secret not set — building unsigned debug APK as fallback"
            echo "KEYSTORE_AVAILABLE=false" >> "$GITHUB_ENV"
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > kirobi-release.keystore
            echo "KEYSTORE_AVAILABLE=true" >> "$GITHUB_ENV"
          fi

      - name: Write keystore.properties (if keystore available)
        if: env.KEYSTORE_AVAILABLE == 'true'
        working-directory: frontend/android
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_ALIAS_PASS: ${{ secrets.KEYSTORE_ALIAS_PASS }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=../kirobi-release.keystore
          storePassword=${KEYSTORE_PASS}
          keyAlias=${KEYSTORE_ALIAS:-kirobi}
          keyPassword=${KEYSTORE_ALIAS_PASS:-$KEYSTORE_PASS}
          EOF

      - name: Grant Gradle executable permission
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Release APK (signed if keystore available)
        working-directory: frontend/android
        run: |
          if [ "$KEYSTORE_AVAILABLE" = "true" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Locate and rename APK
        id: apk_info
        working-directory: frontend/android
        run: |
          if [ "$KEYSTORE_AVAILABLE" = "true" ]; then
            APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
            BUILD_TYPE="release"
          else
            APK_SRC=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
            BUILD_TYPE="debug"
          fi
          
          # Get versionName from build.gradle
          VERSION=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ')
          SUFFIX="${{ github.event.inputs.version_suffix }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          
          if [ -n "$SUFFIX" ]; then
            APK_NAME="Kirobi-v${VERSION}-${SUFFIX}-${BUILD_TYPE}.apk"
          else
            APK_NAME="Kirobi-v${VERSION}-${SHORT_SHA}-${BUILD_TYPE}.apk"
          fi
          
          cp "$APK_SRC" "/tmp/${APK_NAME}"
          APK_SIZE=$(du -sh "/tmp/${APK_NAME}" | cut -f1)
          SHA256=$(sha256sum "/tmp/${APK_NAME}" | cut -d' ' -f1)
          
          {
            echo "apk_path=/tmp/${APK_NAME}"
            echo "apk_name=${APK_NAME}"
            echo "apk_size=${APK_SIZE}"
            echo "sha256=${SHA256}"
            echo "version=${VERSION}"
            echo "build_type=${BUILD_TYPE}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK as GitHub Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_info.outputs.apk_name }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Write Job Summary
        if: always()
        run: |
          # shellcheck disable=SC2129
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            BADGE="![BUILD PASS](https://img.shields.io/badge/BUILD-PASS-brightgreen)"
          else
            BADGE="![BUILD FAIL](https://img.shields.io/badge/BUILD-FAIL-red)"
          fi
          {
            echo "## 📱 Kirobi APK Build"
            echo ""
            echo "$BADGE"
            echo ""
            echo "| Feld | Wert |"
            echo "| --- | --- |"
            echo "| **APK** | \`${{ steps.apk_info.outputs.apk_name }}\` |"
            echo "| **Version** | ${{ steps.apk_info.outputs.version }} |"
            echo "| **Build-Typ** | ${{ steps.apk_info.outputs.build_type }} |"
            echo "| **Größe** | ${{ steps.apk_info.outputs.apk_size }} |"
            echo "| **SHA256** | \`${{ steps.apk_info.outputs.sha256 }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Commit** | \`${GITHUB_SHA::7}\` |"
            echo ""
            echo "> Artefakt 30 Tage verfügbar unter Actions → Artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Telegram — Success Notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="📱 *Kirobi APK Build PASSED*%0A"
          MSG="${MSG}APK: \`${{ steps.apk_info.outputs.apk_name }}\`%0A"
          MSG="${MSG}Version: ${{ steps.apk_info.outputs.version }} | ${{ steps.apk_info.outputs.build_type }}%0A"
          MSG="${MSG}SHA256: \`${{ steps.apk_info.outputs.sha256 }}\`%0A"
          MSG="${MSG}Branch: \`${{ github.ref_name }}\` | Commit: \`${GITHUB_SHA::7}\`%0A"
          MSG="${MSG}[Actions Run](https://github.com/Kirobi92/OpenDisruption/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown"

      - name: Telegram — Failure Notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ *Kirobi APK Build FAILED*%0A"
          MSG="${MSG}Branch: \`${{ github.ref_name }}\` | Commit: \`${GITHUB_SHA::7}\`%0A"
          MSG="${MSG}[Actions Run](https://github.com/Kirobi92/OpenDisruption/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown"

      - name: Cleanup Keystore (security)
        if: always()
        working-directory: frontend/android
        run: |
          rm -f kirobi-release.keystore keystore.properties
