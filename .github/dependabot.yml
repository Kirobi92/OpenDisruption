version: 2
updates:
  # ─── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # ─── NPM: apps/web (Next.js — 9 HIGH CVEs: middleware bypass, SSRF, DoS) ────
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "high-severity"
    groups:
      next-security:
        patterns:
          - "next"
          - "next-*"
      svelte-devalue:
        patterns:
          - "devalue"
          - "serialize-javascript"

  # ─── NPM: apps/dashboard ────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    groups:
      next-security:
        patterns:
          - "next"
          - "next-*"

  # ─── NPM: apps/portal ───────────────────────────────────────────────────────
  - package-ecosystem: "npm"
