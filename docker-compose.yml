networks:
  kirobi-net:
    driver: bridge

volumes:
  openwebui_data:
  qdrant_data:
  postgres_data:
  flowise_data:
  uploads_data:
  ingest_data:
  caddy_data:
  caddy_config:
  redis_data:
  images_data:
  music_data:
  video_data:
  hermes_data:
  openclaw_config_data:
  openclaw_workspace_data:
  # KI-Modelle → Bind-Mounts nach /Datenspeicher/OpenDisruption_KI_Modelle (kein named volume mehr)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: kirobi-ollama
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "bash", "-c", "(echo -e 'GET / HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n'; sleep 1) | bash -c 'cat > /dev/tcp/localhost/11434' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - kirobi-net
    environment:
      # RTX 3090 — 24 GB VRAM: mit SDXL-Turbo max 1 Modell gleichzeitig
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_GPU_MEMORY_FRACTION=${OLLAMA_GPU_MEMORY_FRACTION:-0.60}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Modelle nach 5min Idle aus VRAM entladen → Platz für Bild/Musik-Generierung
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: kirobi-open-webui
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).status==200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET_KEY:-changeme-in-production}
    depends_on:
      - ollama
    networks:
      - kirobi-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kirobi-qdrant
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${QDRANT_PORT:-6333}:6333"
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - kirobi-net
    healthcheck:
      # qdrant image is distroless-style: no curl/wget/python.
      # bash is available and supports /dev/tcp pseudo-files for TCP probing.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── KIDI — Redis ContextDB (Profile: kidi) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kirobi-redis
    profiles:
      - kidi
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${KIROBI_REDIS_PASSWORD:-}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${KIROBI_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${KIROBI_REDIS_PASSWORD:-}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: kirobi-postgres
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kirobi}
      POSTGRES_USER: ${POSTGRES_USER:-kirobi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kirobi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kirobi-net

  flowise:
    image: flowiseai/flowise:latest
    container_name: kirobi-flowise
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${FLOWISE_PORT:-3001}:3000"
    volumes:
      - flowise_data:/root/.flowise
    environment:
      - FLOWISE_USERNAME=${FLOWISE_USERNAME:-admin}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD:-changeme}
      - FLOWISE_SECRETKEY_OVERWRITE=${FLOWISE_SECRET_KEY:-changeme-in-production}
      - LOG_LEVEL=${FLOWISE_LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/v1/ping >/dev/null 2>&1 || curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - kirobi-net

  voice-processing:
    build:
      context: ./services/voice-processing
      dockerfile: Dockerfile
    container_name: kirobi-voice-processing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${VOICE_PORT:-8001}:8001"
    volumes:
      - ./data/conversations:/data/conversations
      - ./data/recordings:/data/recordings
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/piper:/models/piper
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/whisper:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}
      - VOICE_LANGUAGE=${VOICE_LANGUAGE:-de}
      - KIROBI_API_URL=${KIROBI_API_URL:-http://api:8000}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth:8000}
      - KIROBI_API_USER=${KIROBI_DEFAULT_USER:-sven}
      - KIROBI_API_PASSWORD=${KIROBI_DEFAULT_PASSWORD:-changeme}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - ollama
    networks:
      - kirobi-net

  analytics:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: kirobi-analytics
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8010:8010"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
    depends_on:
      - postgres
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  image-generation:
    build:
      context: .
      dockerfile: services/image-generation/Dockerfile
    container_name: kirobi-image-generation
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8011:8011"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GH_TOKEN=${GH_TOKEN:-}
      - STABILITY_API_KEY=${STABILITY_API_KEY:-}
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - IMAGE_STORAGE_PATH=/data/images
    volumes:
      - images_data:/data/images
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/huggingface-image:/data/hf-cache
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/torch-image:/data/torch-cache
    depends_on:
      - ollama
      - postgres
    networks:
      - kirobi-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  media-processing:
    build:
      context: ./services/media-processing
      dockerfile: Dockerfile
    container_name: kirobi-media-processing
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8012:8012"
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  music-generation:
    build:
      context: .
      dockerfile: services/music-generation/Dockerfile
    container_name: kirobi-music-generation
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8013:8013"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - OLLAMA_HOST=http://ollama:11434
      - MUSIC_STORAGE_PATH=/data/music
      - HEARTMULA_MODEL_PATH=/data/heartmula
    volumes:
      - music_data:/data/music
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/huggingface:/data/hf-cache
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/torch:/data/torch-cache
      - ${KI_MODEL_PATH:-/Datenspeicher/OpenDisruption_KI_Modelle}/heartmula:/data/heartmula
    depends_on:
      - postgres
      - ollama
    networks:
      - kirobi-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  video-generation:
    build:
      context: .
      dockerfile: services/video-generation/Dockerfile
    container_name: kirobi-video-generation
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8014:8014"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - OLLAMA_HOST=http://ollama:11434
      - VIDEO_STORAGE_PATH=/data/videos
      - IMAGE_GEN_URL=http://image-generation:8011
    volumes:
      - video_data:/data/videos
    depends_on:
      - postgres
      - ollama
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8014/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nutzi:
    build:
      context: .
      dockerfile: services/nutzi/Dockerfile
    container_name: kirobi-nutzi
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8016:8015"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${NUTZI_MODEL:-qwen2.5:14b}
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - ollama
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  personal-agents:
    build:
      context: .
      dockerfile: services/personal-agents/Dockerfile
    container_name: kirobi-personal-agents
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8017:8017"
    volumes:
      - ./kirobi-core/profiles:/app/profiles:ro
      - /Datenspeicher/OpenDisruption_Datenstruktur/Benutzer-Ordner:/Datenspeicher/OpenDisruption_Datenstruktur/Benutzer-Ordner:rw
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${PERSONAL_AGENTS_MODEL:-qwen2.5:14b}
      - GH_TOKEN=${GH_TOKEN:-}
      - PROFILES_DIR=/app/profiles
      - BENUTZER_BASE=/Datenspeicher/OpenDisruption_Datenstruktur/Benutzer-Ordner
    depends_on:
      - ollama
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8017/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s


  supervisor:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: kirobi-supervisor
    restart: unless-stopped
    volumes:
      - ./kirobi-core:/kirobi-core
      - ./experiences:/experiences
      - ./canon:/canon
      - ./data/supervisor:/data
      - /Datenspeicher/OpenDisruption_Datenstruktur/Benutzer-Ordner:/Datenspeicher/OpenDisruption_Datenstruktur/Benutzer-Ordner:rw
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - VOICE_SERVICE_URL=http://voice-processing:8001
      - EMBEDDINGS_SERVICE_URL=http://embeddings:8000
      - INGEST_SERVICE_URL=http://ingest:8000
      - RETRIEVAL_SERVICE_URL=http://retrieval:8000
      - SUPERVISOR_MODEL=${SUPERVISOR_MODEL:-llama3.1:70b}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      voice-processing:
        condition: service_started
    networks:
      - kirobi-net

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: kirobi-auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${AUTH_PORT:-8002}:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGEME-in-production-use-strong-secret}
      - KIROBI_PUBLIC_ORIGINS=${KIROBI_PUBLIC_ORIGINS:-}
      - KIROBI_DEFAULT_USER=${KIROBI_DEFAULT_USER:-sven}
      - KIROBI_DEFAULT_PASSWORD=${KIROBI_DEFAULT_PASSWORD:-}
      - KIROBI_DEFAULT_DISPLAY_NAME=${KIROBI_DEFAULT_DISPLAY_NAME:-Sven}
      - KIROBI_DEFAULT_ROLE=${KIROBI_DEFAULT_ROLE:-admin}
      - KIROBI_FAMILY_USERS=${KIROBI_FAMILY_USERS:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kirobi-net

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: kirobi-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${API_PORT:-8003}:8000"
    volumes:
      - uploads_data:/data/uploads
      - ./canon:/canon:ro
      - ./experiences:/data/experiences:rw
      - ./extracts/family-private:/data/family-private:rw
      - /Datenspeicher/OpenDisruption_Datenstruktur/Benutzer-Ordner:/Datenspeicher/OpenDisruption_Datenstruktur/Benutzer-Ordner:rw
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - AUTH_SERVICE_URL=http://auth:8000
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - KIROBI_PUBLIC_ORIGINS=${KIROBI_PUBLIC_ORIGINS:-}
      - KIROBI_USERSPACE_ROOT=/data/experiences/users
      - KIROBI_FAMILY_SPACE_ROOT=/data/experiences/family
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - kirobi-net

  telegram:
    build:
      context: ./services/telegram
      dockerfile: Dockerfile
    container_name: kirobi-telegram
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${TELEGRAM_PORT:-8005}:8005"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-}
      - TELEGRAM_NOTIFY_CHANNEL_ID=${TELEGRAM_NOTIFY_CHANNEL_ID:-}
      - TELEGRAM_NOTIFY_ON_START=${TELEGRAM_NOTIFY_ON_START:-false}
      - TELEGRAM_WEBHOOK_HOST=${TELEGRAM_WEBHOOK_HOST:-}
      - KIROBI_API_URL=http://api:8000
      - KIROBI_AUTH_URL=http://auth:8000
      - KIROBI_BOT_USER=${KIROBI_BOT_USER:-${KIROBI_DEFAULT_USER:-sven}}
      - KIROBI_BOT_PASSWORD=${KIROBI_BOT_PASSWORD:-${KIROBI_DEFAULT_PASSWORD:-}}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      auth:
        condition: service_started
    networks:
      - kirobi-net

  embeddings:
    build:
      context: .
      dockerfile: services/embeddings/Dockerfile
    container_name: kirobi-embeddings
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8004:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - EMBED_DIM=${EMBED_DIM:-768}
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_healthy
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    container_name: kirobi-ingest
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8007:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kirobi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kirobi}
      - EMBEDDINGS_SERVICE_URL=http://embeddings:8004
      - AUTH_SERVICE_URL=http://auth:8000
    volumes:
      - uploads_data:/data/uploads
      - ingest_data:/data/ingest
    depends_on:
      - postgres
      - embeddings
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    container_name: kirobi-retrieval
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8006:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDINGS_SERVICE_URL=http://embeddings:8004
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
    depends_on:
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_started
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: kirobi-web
    restart: unless-stopped
    # Direct exposure on KIROBI_WEB_PORT is kept for local dev / debugging,
    # but the canonical entry point for the family is the Caddy reverse
    # proxy below (port 80/443).
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${WEB_PORT:-3002}:3000"
    environment:
      # Empty AUTH_/API_SERVICE_URL means Next.js does NOT inject rewrites;
      # all /api/* traffic is then handled by Caddy in production. Set them
      # only when using `next dev` directly.
      - AUTH_SERVICE_URL=${WEB_AUTH_UPSTREAM:-}
      - API_SERVICE_URL=${WEB_API_UPSTREAM:-}
      - NEXT_PUBLIC_APP_NAME=Kirobi
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - auth
      - api
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - kirobi-net

  voice:
    build:
      context: ./apps/voice
      dockerfile: Dockerfile
    container_name: kirobi-voice
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${VOICE_APP_PORT:-3004}:3004"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - auth
      - api
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  model-routing:
    build:
      context: ./services/model-routing
      dockerfile: Dockerfile
    image: kirobi-model-routing:latest
    container_name: kirobi-model-routing
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - MODEL_CHAT_PRIMARY=${MODEL_CHAT_PRIMARY:-qwen2.5:14b}
      - MODEL_CODE_PRIMARY=${MODEL_CODE_PRIMARY:-qwen2.5-coder:7b}
      - MODEL_REASONING_PRIMARY=${MODEL_REASONING_PRIMARY:-qwen2.5:14b}
      - MODEL_ROUTING_PORT=8009
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:8009:8009"
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kirobi-net

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TAILSCALE_HOST: ${NEXT_PUBLIC_TAILSCALE_HOST:-pop-os.taildd322d.ts.net}
        NEXT_PUBLIC_LAN_HOST: ${NEXT_PUBLIC_LAN_HOST:-192.168.178.10}
    container_name: kirobi-dashboard
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:3003:3003"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_TAILSCALE_HOST=${NEXT_PUBLIC_TAILSCALE_HOST:-pop-os.taildd322d.ts.net}
      - NEXT_PUBLIC_LAN_HOST=${NEXT_PUBLIC_LAN_HOST:-192.168.178.10}
    depends_on:
      - api
      - auth
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/dashboard', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: kirobi-admin
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_TAILSCALE_HOST=${NEXT_PUBLIC_TAILSCALE_HOST:-pop-os.taildd322d.ts.net}
      - NEXT_PUBLIC_LAN_HOST=${NEXT_PUBLIC_LAN_HOST:-192.168.178.10}
    depends_on:
      - api
      - auth
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/admin', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  portal:
    build:
      context: ./apps/portal
      dockerfile: Dockerfile
    container_name: kirobi-portal
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_TAILSCALE_HOST=${NEXT_PUBLIC_TAILSCALE_HOST:-pop-os.taildd322d.ts.net}
      - NEXT_PUBLIC_LAN_HOST=${NEXT_PUBLIC_LAN_HOST:-192.168.178.10}
    depends_on:
      - api
      - auth
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/portal', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-svelte:
    build:
      context: ./apps/web-svelte
      dockerfile: Dockerfile
    container_name: kirobi-web-svelte
    restart: unless-stopped
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - HOST=0.0.0.0
    depends_on:
      - auth
      - api
    networks:
      - kirobi-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/v2/login', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: kirobi-caddy
    restart: unless-stopped
    # Caddy is the LAN-facing entry point. We bind it to the public host
    # so kirobi.local + the LAN IP resolve to this container, while every
    # other service stays on KIROBI_BIND_HOST (127.0.0.1 by default).
    ports:
      - "${KIROBI_PROXY_BIND_HOST:-0.0.0.0}:${CADDY_HTTP_PORT:-80}:80"
      - "${KIROBI_PROXY_BIND_HOST:-0.0.0.0}:${CADDY_HTTPS_PORT:-443}:443"
      - "${KIROBI_PROXY_BIND_HOST:-0.0.0.0}:${CADDY_OPENWEBUI_HTTPS_PORT:-8441}:8441"
      - "${KIROBI_PROXY_BIND_HOST:-0.0.0.0}:${CADDY_FLOWISE_HTTPS_PORT:-8442}:8442"
      - "${KIROBI_PROXY_BIND_HOST:-0.0.0.0}:${CADDY_QDRANT_HTTPS_PORT:-8443}:8443"
    environment:
      - KIROBI_HOSTNAME=${KIROBI_HOSTNAME:-kirobi.local}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - web-svelte
      - dashboard
      - admin
      - portal
      - auth
      - api
      - open-webui
      - flowise
      - qdrant
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - kirobi-net

  # ─── KIDI — Agenten-Skelette (Profile: agents) ────────────────────────────
  # Headless-Aufruf: docker compose --profile agents run --rm agent-opencode
  # Oder via Makefile: make agent-opencode TASK='{"task_type":"generate_code","payload":{}}'

  agent-opencode:
    build:
      context: .
      dockerfile: agents/opencode/Dockerfile
    image: kirobi-agent-opencode:latest
    container_name: kirobi-agent-opencode
    profiles:
      - agents
    restart: "no"
    environment:
      - KIROBI_REDIS_URL=${KIROBI_REDIS_URL:-redis://redis:6379/0}
      - KIROBI_REDIS_PASSWORD=${KIROBI_REDIS_PASSWORD:-}
      - KIROBI_EGRESS_ALLOWED=${KIROBI_EGRESS_ALLOWED:-false}
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - kirobi-net

  agent-openclaw:
    build:
      context: .
      dockerfile: agents/openclaw/Dockerfile
    image: kirobi-agent-openclaw:latest
    container_name: kirobi-agent-openclaw
    profiles:
      - agents
    restart: "no"
    environment:
      - KIROBI_REDIS_URL=${KIROBI_REDIS_URL:-redis://redis:6379/0}
      - KIROBI_REDIS_PASSWORD=${KIROBI_REDIS_PASSWORD:-}
      - KIROBI_EGRESS_ALLOWED=${KIROBI_EGRESS_ALLOWED:-false}
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - kirobi-net

  agent-hermes:
    build:
      context: .
      dockerfile: agents/hermes/Dockerfile
    image: kirobi-agent-hermes:latest
    container_name: kirobi-agent-hermes
    profiles:
      - agents
    restart: "no"
    environment:
      - KIROBI_REDIS_URL=${KIROBI_REDIS_URL:-redis://redis:6379/0}
      - KIROBI_REDIS_PASSWORD=${KIROBI_REDIS_PASSWORD:-}
      - KIROBI_EGRESS_ALLOWED=${KIROBI_EGRESS_ALLOWED:-false}
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - kirobi-net

  agent-obsidian:
    build:
      context: .
      dockerfile: agents/obsidian/Dockerfile
    image: kirobi-agent-obsidian:latest
    container_name: kirobi-agent-obsidian
    profiles:
      - agents
    restart: "no"
    environment:
      - KIROBI_REDIS_URL=${KIROBI_REDIS_URL:-redis://redis:6379/0}
      - KIROBI_REDIS_PASSWORD=${KIROBI_REDIS_PASSWORD:-}
      - KIROBI_EGRESS_ALLOWED=${KIROBI_EGRESS_ALLOWED:-false}
      - KIROBI_VAULT_PATH=/vault
      - PYTHONPATH=/app
    volumes:
      - ./obsidian:/vault:ro
    depends_on:
      - redis
    networks:
      - kirobi-net

  # ─── External Agent Track (Phase 4.5, Profile: external-agents) ────────────
  # Submodules unter external/ müssen vor dem ersten Build initialisiert sein:
  #   git submodule update --init --recursive

  hermes-runtime:
    build:
      context: ./external/hermes-agent
    image: hermes-agent:local
    container_name: kirobi-hermes-runtime
    # Kein Profile-Gate — Hermes ist der einzige Telegram-Gateway
    restart: unless-stopped
    # Run entrypoint as root so it can remap hermes → sven's UID (1000) via gosu.
    # This gives the hermes process read/write access to the mounted repo.
    user: "0:0"
    group_add:
      - "${DOCKER_GID:-985}"  # docker group → /var/run/docker.sock access
    environment:
      # Remap hermes user to sven's UID so it can write to the mounted repo
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      # Dashboard als Hintergrundprozess starten; gateway run ist der Vordergrundprozess
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=${HERMES_RUNTIME_PORT:-9119}
      # Telegram-Gateway: Einziger Bot — Hermes übernimmt alles
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USER_IDS:-}
      # GitHub Models API (gh auth token oder PAT mit models:read Scope)
      - GH_TOKEN=${GH_TOKEN:-}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      # Fallback-Provider URL: GitHub Models OpenAI-kompatibler Endpunkt
      - COPILOT_API_BASE_URL=https://models.github.ai/inference/v1
      # Terminal tool: lokal im Container ausführen (Standard)
      - TERMINAL_ENV=local
      # Git-Safe-Directory für das gemountete Repo
      - GIT_CONFIG_GLOBAL=/opt/data/home/.gitconfig
    volumes:
      - hermes_data:/opt/data
      - ./services/hermes-runtime/config/cli-config.yaml:/opt/data/cli-config.yaml:ro
      - ./services/hermes-runtime/config/skills/opendisruption:/opt/data/skills/opendisruption:ro
      - ./services/hermes-runtime/config/skills/nutzi:/opt/data/skills/nutzi:ro
      # Docker-Socket → Hermes kann docker compose / docker exec ausführen
      - /var/run/docker.sock:/var/run/docker.sock
      # OpenDisruption-Repo → Hermes kann Dateien lesen und bearbeiten, git pull/push
      - /home/sven/OpenDisruption:/home/sven/OpenDisruption:rw
      # Home-Verzeichnis von sven → Zugriff auf .ssh, .env, etc. (read-only für Sicherheit)
      - /home/sven/.ssh:/home/sven/.ssh:ro
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${HERMES_RUNTIME_PORT:-9119}:9119"
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:9119/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3
    networks:
      - kirobi-net
    command: ["gateway", "run"]

  openclaw-gateway:
    build:
      context: ./external/openclaw
    image: openclaw:local
    container_name: kirobi-openclaw-gateway
    profiles:
      - external-agents
    restart: unless-stopped
    init: true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/home/node/.openclaw/workspace
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_DISABLE_BONJOUR=${OPENCLAW_DISABLE_BONJOUR:-1}
      - TZ=${OPENCLAW_TZ:-UTC}
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - openclaw_config_data:/home/node/.openclaw
      - openclaw_workspace_data:/home/node/.openclaw/workspace
    ports:
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${KIROBI_BIND_HOST:-127.0.0.1}:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    depends_on:
      - ollama
    networks:
      - kirobi-net
    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "${OPENCLAW_GATEWAY_BIND:-lan}"
      - "--port"
      - "18789"
      - "--allow-unconfigured"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
