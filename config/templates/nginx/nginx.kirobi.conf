# nginx.conf template — alternative to Caddy when corp policy requires Nginx.
# Place at /etc/nginx/conf.d/kirobi.conf. TLS termination assumed via certbot.

upstream web      { server 127.0.0.1:3002; }
upstream auth_svc { server 127.0.0.1:8002; }
upstream api_svc  { server 127.0.0.1:8003; }

server {
    listen       80;
    server_name  kirobi.local REPLACE_HOSTNAME;
    return       301 https://$host$request_uri;
}

server {
    listen              443 ssl http2;
    server_name         kirobi.local REPLACE_HOSTNAME;

    ssl_certificate     /etc/letsencrypt/live/REPLACE_HOSTNAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/REPLACE_HOSTNAME/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50M;
    gzip on; gzip_types text/plain application/json application/javascript text/css;

    location /auth/ { proxy_pass http://auth_svc; include /etc/nginx/proxy_params; }
    location /api/  { proxy_pass http://api_svc;  include /etc/nginx/proxy_params; }
    location /      { proxy_pass http://web;      include /etc/nginx/proxy_params; }
}
