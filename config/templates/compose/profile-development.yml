# docker-compose.override.yml — profile: development
# Mount source for hot reload and enable verbose logging. To expose services
# on 0.0.0.0 for colleagues to hit your dev box, set KIROBI_BIND_HOST=0.0.0.0
# (and any corresponding proxy bind host) in .env or the base compose config.
services:
  api:
    environment:
      - KIROBI_LOG_LEVEL=debug
    volumes:
      - ./services/api:/app:ro
  auth:
    environment:
      - KIROBI_LOG_LEVEL=debug
    volumes:
      - ./services/auth:/app:ro
  web:
    environment:
      - NEXT_PUBLIC_DEV=1
    volumes:
      - ./apps/web:/app:rw
