# docker-compose.override.yml — profile: nvidia
# Full stack with NVIDIA GPU passthrough. Requires nvidia-container-toolkit
# on the host. The base compose file already has the device reservation,
# this override just makes intent explicit and tunes for GPU.
services:
  ollama:
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_KEEP_ALIVE=24h
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
