# docker-compose.override.yml — profile: voice-full
# Enables the voice processing stack in the generated single-profile override.
# This template is selected directly by the installer rather than layered with
# profile-cpu.yml or profile-nvidia.yml via multiple `-f` files.
# `VOICE_DEVICE` defaults to `cpu` unless overridden by environment settings.
services:
  voice-processing:
    profiles: []   # explicitly enable
    restart: unless-stopped
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - PIPER_VOICE=${PIPER_VOICE:-de_DE-thorsten-medium}
      - VOICE_DEVICE=${VOICE_DEVICE:-cpu}
